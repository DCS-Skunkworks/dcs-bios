name: Update Arduino Library Addresses.h

on:
  workflow_run:
    workflows: ["Release DCS-BIOS stable build"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      head_sha:
        description: "Commit SHA to checkout (defaults to current HEAD)"
        required: false
      head_branch:
        description: "Branch/tag name to use in PR title and branch name"
        required: false
        default: "test"

jobs:
  update-addresses:
    # only run if triggered manually or if the release workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    permissions:
      contents: read

    name: Open PR against arduino library with updated Addresses.h
    steps:
      - name: Check for required secret
        run: |
          if [ -z "${{ secrets.ARDUINO_REPO_TOKEN }}" ]; then
            echo "::error::ARDUINO_REPO_TOKEN secret is not set. A fine-grained PAT with Contents and Pull requests write access to dcs-bios-arduino-library is required."
            exit 1
          fi

      - name: Checkout dcs-bios at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.head_sha || github.sha }}

      - name: Set up lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1.5"

        # compile to ensure Addresses.h is up-to-date with this release
      - name: Compile
        run: |
          lua ./Scripts/DCS-BIOS/test/compile/LocalCompile.lua

      - name: Checkout arduino library
        uses: actions/checkout@v4
        with:
          # TODO: change to DCS-Skunkworks/dcs-bios-arduino-library before merging
          repository: TylerDOC1776/dcs-bios-arduino-library
          token: ${{ secrets.ARDUINO_REPO_TOKEN }}
          path: arduino-library

      - name: Copy Addresses.h into arduino library
        run: cp Scripts/DCS-BIOS/doc/Addresses.h arduino-library/src/internal/Addresses.h

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.ARDUINO_REPO_TOKEN }}
          path: arduino-library
          commit-message: "Update Addresses.h for ${{ github.event.workflow_run.head_branch || inputs.head_branch }}"
          branch: "update-addresses-${{ github.event.workflow_run.head_branch || inputs.head_branch }}"
          title: "Update Addresses.h for ${{ github.event.workflow_run.head_branch || inputs.head_branch }}"
          base: master # default branch of dcs-bios-arduino-library
          body: |
            Automated update of `src/internal/Addresses.h` from DCS-BIOS release ${{ github.event.workflow_run.head_branch || inputs.head_branch }}.

            Generated by the [update-arduino-addresses](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-arduino-addresses.yml) workflow.
