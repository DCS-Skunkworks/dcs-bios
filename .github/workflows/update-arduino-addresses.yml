name: Update Arduino Library Addresses.h

on:
  workflow_run:
    workflows: ["Release DCS-BIOS stable build"]
    types:
      - completed

  # Allows manual triggering from the Actions tab, useful for testing or
  # re-running after a failed release without cutting a new tag.
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the stable release workflow to pull Addresses.h from"
        required: true
      head_branch:
        description: "Branch/tag name to use in PR title and branch name"
        required: false
        default: "test"

jobs:
  check-for-changes:
    # only run if triggered manually or if the release workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    outputs:
      changed: ${{ steps.check-for-changes.outputs.changed }}

    steps:
      - name: Download Addresses.h from release workflow
        uses: actions/download-artifact@v8
        with:
          name: addresses-h
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          github-token: ${{ github.token }}
          path: downloaded

      - name: Checkout arduino library
        uses: actions/checkout@v6
        with:
          repository: TylerDOC1776/dcs-bios-arduino-library
          path: arduino-library

      - name: Check if Addresses.h changed
        id: check-for-changes
        run: |
          if diff -q downloaded/Addresses.h arduino-library/src/internal/Addresses.h > /dev/null 2>&1; then
            echo "Addresses.h is unchanged. Skipping PR."
          else
            echo "Addresses.h has changed. Proceeding with PR."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Addresses.h for open-pr job
        uses: actions/upload-artifact@v7
        with:
          name: addresses-h-pending
          path: downloaded/Addresses.h

  open-pr:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true'

    runs-on: ubuntu-latest

    permissions: {}

    steps:
      - name: Download Addresses.h
        uses: actions/download-artifact@v8
        with:
          name: addresses-h-pending
          path: downloaded

      - name: Checkout arduino library
        uses: actions/checkout@v6
        with:
          repository: TylerDOC1776/dcs-bios-arduino-library
          path: arduino-library

      - name: Copy Addresses.h into arduino library
        run: cp downloaded/Addresses.h arduino-library/src/internal/Addresses.h

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.ARDUINO_REPO_TOKEN }}
          path: arduino-library
          commit-message: "Update Addresses.h for ${{ github.event.workflow_run.head_branch || inputs.head_branch }}"
          branch: "update-addresses-${{ github.event.workflow_run.head_branch || inputs.head_branch }}"
          title: "Update Addresses.h for ${{ github.event.workflow_run.head_branch || inputs.head_branch }}"
          body: |
            Automated update of `src/internal/Addresses.h` from DCS-BIOS release ${{ github.event.workflow_run.head_branch || inputs.head_branch }}.

            Generated by the [update-arduino-addresses](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-arduino-addresses.yml) workflow.

      - name: Log pull request URL
        run: echo "Pull request created at ${{ steps.create-pr.outputs.pull-request-url }}"
